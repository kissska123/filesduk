<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>ФАЙЛЫ ДЮКА АРХИВ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            font-family: 'Courier New', 'Fira Code', 'Source Code Pro', monospace;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            position: relative;
            overflow-x: hidden;
        }

        .tv-wrapper {
            position: relative;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
        }

        .tv-screen {
            position: relative;
            background: #000;
            border-radius: 50px / 35px;
            overflow: hidden;
            box-shadow: 
                0 0 0 6px #2a2418,
                0 0 0 10px #1a150e,
                0 0 0 16px #0c0a06,
                0 20px 40px rgba(0,0,0,0.8),
                inset 0 0 40px rgba(0,0,0,0.5);
        }

        .tv-content {
            position: relative;
            width: 100%;
            padding: 28px;
            background: radial-gradient(ellipse at center, #0a0f1e 0%, #03060c 100%);
            transform: scale(1.02);
            transform-origin: center center;
            animation: barrelPulse 4s ease-in-out infinite;
        }

        @keyframes barrelPulse {
            0% { transform: scale(1) perspective(800px) rotateX(0deg) rotateY(0deg); }
            50% { transform: scale(1.01) perspective(800px) rotateX(0.3deg) rotateY(0.2deg); }
            100% { transform: scale(1) perspective(800px) rotateX(0deg) rotateY(0deg); }
        }

        .tv-content::before {
            content: "";
            position: absolute;
            top: -5%;
            left: -5%;
            width: 110%;
            height: 110%;
            background: radial-gradient(circle at 50% 50%, transparent 60%, rgba(0,0,0,0.6) 100%);
            pointer-events: none;
            z-index: 5;
        }

        .grain {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0MDAiIGhlaWdodD0iNDAwIj48ZmlsdGVyIGlkPSJmIj48ZmVUdXJidWxlbmNlIHR5cGU9ImZyYWN0YWxOb2lzZSIgYmFzZUZyZXF1ZW5jeT0iLjUiIG51bU9jdGF2ZXM9IjMiLz48L2ZpbHRlcj48cmVjdCB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIxMDAlIiBmaWx0ZXI9InVybCgjZikiIG9wYWNpdHk9IjAuMjUiLz48L3N2Zz4=');
            background-repeat: repeat;
            background-size: 100px;
            opacity: 0.2;
            pointer-events: none;
            z-index: 10;
            animation: grainShift 0.2s steps(2) infinite;
        }

        @keyframes grainShift {
            0% { opacity: 0.12; transform: translate(0, 0); }
            100% { opacity: 0.22; transform: translate(1%, 1%); }
        }

        .scanlines {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(0deg, rgba(0,0,0,0.2) 0px, rgba(0,0,0,0.2) 2px, transparent 2px, transparent 4px);
            pointer-events: none;
            z-index: 10;
            animation: scanMove 0.1s linear infinite;
        }

        @keyframes scanMove {
            0% { transform: translateY(0); }
            100% { transform: translateY(2px); }
        }

        .wobble {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(90deg, rgba(255,200,100,0.03) 0px, rgba(255,200,100,0.03) 2px, transparent 2px, transparent 8px);
            animation: wobbleEffect 0.2s ease-in-out infinite alternate;
            pointer-events: none;
            z-index: 10;
        }

        @keyframes wobbleEffect {
            0% { transform: skewX(0deg); opacity: 0.15; }
            100% { transform: skewX(0.2deg); opacity: 0.3; }
        }

        .tv-glare {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at 30% 20%, rgba(255,255,220,0.06) 0%, transparent 70%);
            pointer-events: none;
            z-index: 12;
        }

        .vignette {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            box-shadow: inset 0 0 60px rgba(0,0,0,0.6);
            pointer-events: none;
            z-index: 11;
            border-radius: 50px / 35px;
        }

        .chromatic {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, transparent 70%, rgba(255,0,0,0.04) 85%, rgba(0,0,255,0.04) 95%);
            mix-blend-mode: screen;
            pointer-events: none;
            z-index: 9;
            animation: chromaShift 3s infinite alternate;
        }

        @keyframes chromaShift {
            0% { opacity: 0.2; }
            100% { opacity: 0.5; }
        }

        .dossier {
            width: 100%;
            background: rgba(8, 12, 20, 0.88);
            backdrop-filter: blur(2px);
            border: 1px solid rgba(210, 180, 80, 0.5);
            border-radius: 1.5rem;
            box-shadow: 0 0 40px rgba(0,0,0,0.5);
            padding: 2rem;
            position: relative;
            z-index: 20;
        }

        .header {
            border-bottom: 2px solid #d4af37;
            margin-bottom: 1.5rem;
            padding-bottom: 0.8rem;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            flex-wrap: wrap;
            gap: 0.8rem;
        }

        .title-main {
            font-size: 2rem;
            font-weight: bold;
            letter-spacing: 4px;
            color: #ecd67a;
            text-shadow: 0 0 8px #a57c1c, 0 2px 0 #2c2412;
        }

        .stamp {
            font-size: 0.7rem;
            background: #2a2418;
            padding: 0.3rem 0.8rem;
            border-radius: 30px;
            color: #d4af37;
            border: 1px solid #b48c2c;
            font-weight: bold;
        }

        .sub {
            font-size: 0.7rem;
            color: #d4bc7a;
            margin-top: 0.3rem;
        }

        /* ========== МОДАЛЬНОЕ ОКНО — ПОЛНОСТЬЮ ПЕРЕДЕЛАНО ========== */
        .custom-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.96);
            backdrop-filter: blur(8px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .custom-modal-content {
            background: linear-gradient(135deg, #1a1f2e, #0f1320);
            border: 2px solid #d4af37;
            border-radius: 24px;
            padding: 24px 32px;
            text-align: center;
            box-shadow: 0 0 50px rgba(212, 175, 55, 0.4);
            width: auto;
            min-width: 280px;
            max-width: 420px;
            margin: 0 20px;
        }

        .custom-modal-icon {
            font-size: 48px;
            margin-bottom: 12px;
        }

        .custom-modal-text {
            font-size: 24px;
            font-weight: bold;
            color: #ecd67a;
            margin-bottom: 8px;
            text-shadow: 0 0 4px #d4af37;
            letter-spacing: 2px;
            white-space: nowrap;
        }

        .custom-modal-sub {
            font-size: 16px;
            color: #ffdd99;
            margin-bottom: 24px;
            border-top: 1px solid #d4af37;
            padding-top: 12px;
            font-weight: bold;
        }

        .custom-modal-btn {
            background: #d4af37;
            border: none;
            padding: 10px 28px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            color: #1a1f2e;
            transition: 0.2s;
            font-family: monospace;
        }

        .custom-modal-btn:hover {
            background: #ffdd77;
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.6);
        }

        .main-content { display: none; }
        
        .timer-section {
            background: rgba(0, 0, 0, 0.6);
            border-radius: 1.5rem;
            padding: 1rem 1.2rem;
            margin-bottom: 1.8rem;
            border: 1px solid #d4af37;
            text-align: center;
        }

        .timer-label {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: #f2dd9f;
            margin-bottom: 0.6rem;
            font-weight: bold;
        }

        .timer-display {
            display: flex;
            justify-content: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .timer-block {
            background: #000000aa;
            padding: 0.5rem 1rem;
            border-radius: 1rem;
            min-width: 90px;
            border: 1px solid #d4af37;
        }

        .timer-number {
            font-size: 2.2rem;
            font-weight: bold;
            color: #ffdd99;
            line-height: 1;
        }

        .timer-unit {
            font-size: 0.75rem;
            color: #ffdd99;
            letter-spacing: 1px;
        }

        .timer-status {
            font-size: 1rem;
            margin-top: 0.8rem;
            color: #ffdd99;
            font-weight: bold;
            background: rgba(0,0,0,0.4);
            display: inline-block;
            padding: 0.3rem 1.2rem;
            border-radius: 2rem;
        }
        
        .files-list { display: flex; flex-direction: column; gap: 1rem; margin: 1.8rem 0; }
        
        .file-item {
            background: rgba(0, 0, 0, 0.6);
            border-left: 5px solid #d4af37;
            border-radius: 1rem;
            padding: 0.9rem 1.2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .file-item.completed { 
            border-left-color: #2c9c4a; 
            background: rgba(30, 50, 35, 0.7);
        }

        .file-info { display: flex; align-items: baseline; gap: 1rem; flex-wrap: wrap; }
        .file-index { font-size: 1.4rem; font-weight: bold; color: #d4af37; }
        .file-name { font-size: 1.1rem; font-weight: 600; color: #ffefb9; word-break: break-word; }
        .status-badge { font-size: 1.2rem; background: #2a2418; padding: 0.2rem 0.8rem; border-radius: 40px; color: #ffdd99; }
        .completed .status-badge { background: #1f4529; color: #a5f0b0; }
        
        .toggle-btn {
            background: #3a3224;
            border: 1px solid #d4af37;
            color: #ffefb9;
            padding: 0.4rem 1.2rem;
            border-radius: 2rem;
            cursor: pointer;
            font-family: monospace;
            font-size: 0.9rem;
            font-weight: bold;
            white-space: nowrap;
        }

        .stats-panel {
            background: rgba(0, 0, 0, 0.6);
            border-radius: 1.5rem;
            padding: 1rem 1.5rem;
            margin-top: 1.2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            border: 1px solid #4a412a;
        }

        .counter {
            font-size: 1.2rem;
            background: #000000aa;
            padding: 0.5rem 1.2rem;
            border-radius: 2rem;
            color: #ffdd99;
            font-weight: bold;
        }

        .reset-btn {
            background: #2c2418;
            border: 1px solid #d4af37;
            color: #ffdd99;
            padding: 0.5rem 1.2rem;
            border-radius: 2rem;
            cursor: pointer;
            font-family: monospace;
            font-size: 0.9rem;
            font-weight: bold;
        }

        .footer-note {
            margin-top: 1.5rem;
            font-size: 0.75rem;
            text-align: center;
            color: #c9b16b;
            border-top: 1px dashed #5a4e2e;
            padding-top: 1rem;
        }

        .legend {
            display: flex;
            justify-content: center;
            gap: 1.2rem;
            margin-bottom: 0.3rem;
            font-size: 0.75rem;
            color: #ddc88a;
        }

        @keyframes glowPulse {
            0% { text-shadow: 0 0 2px #ffdd99; }
            100% { text-shadow: 0 0 12px #ffaa33; }
        }

        .just-updated {
            animation: glowPulse 0.5s ease-out 2;
        }

        @media (max-width: 680px) {
            body { padding: 12px; }
            .tv-content { padding: 16px; }
            .dossier { padding: 1.2rem; }
            .title-main { font-size: 1.4rem; letter-spacing: 2px; }
            .timer-number { font-size: 1.6rem; }
            .timer-block { min-width: 65px; }
            .file-name { font-size: 0.9rem; }
            .file-index { font-size: 1.1rem; }
            .counter { font-size: 0.95rem; }
            .reset-btn { font-size: 0.8rem; }
            .toggle-btn { font-size: 0.8rem; padding: 0.3rem 1rem; }
            .custom-modal-text { font-size: 20px !important; white-space: normal !important; }
            .custom-modal-content { padding: 20px 24px !important; max-width: 340px !important; }
        }

        @media (max-width: 480px) {
            .timer-display { gap: 0.5rem; }
            .timer-block { min-width: 55px; padding: 0.3rem 0.5rem; }
            .timer-number { font-size: 1.3rem; }
            .file-info { gap: 0.5rem; }
            .custom-modal-text { font-size: 18px !important; }
            .custom-modal-sub { font-size: 14px !important; }
            .custom-modal-icon { font-size: 40px !important; }
        }
    </style>
</head>
<body>
<div class="tv-wrapper">
    <div class="tv-screen">
        <div class="tv-content">
            <div class="dossier" id="app">
                <div class="header">
                    <div>
                        <div class="title-main">ФАЙЛЫ ДЮКА</div>
                        <div class="sub">▸ АУДИОМАТЕРИАЛЫ ▸ .MP3 ▸ АРХИВ</div>
                    </div>
                    <div class="stamp">ДОПУСК A-1 ▲</div>
                </div>

                <div id="customModal" class="custom-modal">
                    <div class="custom-modal-content">
                        <div class="custom-modal-icon">📺</div>
                        <div class="custom-modal-text">АКТ 1 СЕГОДНЯ</div>
                        <div class="custom-modal-sub">доступ к архиву открыт</div>
                        <button class="custom-modal-btn" id="closeCustomModalBtn">ВОЙТИ В АРХИВ</button>
                    </div>
                </div>

                <div id="mainContent" class="main-content">
                    <div class="timer-section">
                        <div class="timer-label">⏳ ДО 18:30 ПО МСК ⏳</div>
                        <div class="timer-display" id="timerDisplay">
                            <div class="timer-block"><div class="timer-number" id="hours">00</div><div class="timer-unit">ЧАСОВ</div></div>
                            <div class="timer-block"><div class="timer-number" id="minutes">00</div><div class="timer-unit">МИНУТ</div></div>
                            <div class="timer-block"><div class="timer-number" id="seconds">00</div><div class="timer-unit">СЕКУНД</div></div>
                        </div>
                        <div class="timer-status" id="timerStatus">⚡ АРХИВ РАЗБЛОКИРОВАН ⚡</div>
                    </div>
                    <div class="files-list" id="filesContainer"></div>
                    <div class="stats-panel">
                        <div class="counter" id="progressCounter">ЗАКРЫТО: 1 / 11</div>
                        <button class="reset-btn" id="resetAllBtn">⟳ СБРОСИТЬ ВСЕ МЕТКИ</button>
                    </div>
                    <div class="footer-note">
                        <div class="legend">
                            <span>❌ — не получено</span><span>✅ — добыто</span><span>🎵 .mp3</span>
                        </div>
                        <div>© АУДИОАРХИВ ДЮКА</div>
                    </div>
                </div>
            </div>
        </div>
        <div class="grain"></div>
        <div class="scanlines"></div>
        <div class="wobble"></div>
        <div class="chromatic"></div>
        <div class="tv-glare"></div>
        <div class="vignette"></div>
    </div>
</div>

<script>
    let pendingUnlock = true;

    const FILES_DATA = [
        { id: 0, displayBase: "допрос с пристрастием" },
        { id: 1, displayBase: "чистосердечное признание" },
        { id: 2, displayBase: "patriot" },
        { id: 3, displayBase: "not gay" },
        { id: 4, displayBase: "black мурин" },
        { id: 5, displayBase: "chatEVD" },
        { id: 6, displayBase: "когда сел за особо тяжкое" },
        { id: 7, displayBase: "rab sistemy" },
        { id: 8, displayBase: "восьмиклассница" },
        { id: 9, displayBase: "nikogda ne/CVETI!" },
        { id: 10, displayBase: "таков путь" }
    ];
    const FILE_EXT = ".mp3";
    const STORAGE_KEY = "duke_files_mp3_status";
    
    let filesCompleted = new Array(11).fill(false);
    filesCompleted[1] = true;

    const customModal = document.getElementById('customModal');
    const closeCustomModalBtn = document.getElementById('closeCustomModalBtn');
    const mainContent = document.getElementById('mainContent');
    
    function loadState() {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
            try {
                const parsed = JSON.parse(saved);
                if (parsed.length === 11) filesCompleted = parsed.map(v => !!v);
            } catch(e) {}
        }
    }
    
    function saveState() { 
        localStorage.setItem(STORAGE_KEY, JSON.stringify(filesCompleted)); 
    }
    
    function animateCounter() {
        const counterEl = document.getElementById('progressCounter');
        if (counterEl) {
            counterEl.classList.add('just-updated');
            setTimeout(() => counterEl.classList.remove('just-updated'), 700);
        }
    }
    
    function renderList() {
        const container = document.getElementById('filesContainer');
        if (!container) return;
        let completedCount = filesCompleted.filter(v => v).length;
        const counterEl = document.getElementById('progressCounter');
        if (counterEl) counterEl.innerHTML = `ЗАКРЫТО: ${completedCount} / 11`;
        
        let html = '';
        for (let i = 0; i < FILES_DATA.length; i++) {
            const f = FILES_DATA[i];
            const done = filesCompleted[i];
            html += `
                <div class="file-item ${done ? 'completed' : ''}" data-file-id="${i}">
                    <div class="file-info">
                        <span class="file-index">${(i+1).toString().padStart(2,'0')}</span>
                        <span class="file-name">${f.displayBase}${FILE_EXT}</span>
                    </div>
                    <div style="display:flex; gap:12px; align-items:center;">
                        <span class="status-badge">${done ? '✅' : '❌'}</span>
                        <button class="toggle-btn" data-id="${i}">${done ? 'ЗАКРЫТЬ' : 'ОТМЕТИТЬ'}</button>
                    </div>
                </div>
            `;
        }
        container.innerHTML = html;
        
        document.querySelectorAll('.toggle-btn').forEach(btn => {
            btn.onclick = () => {
                const idx = parseInt(btn.dataset.id);
                filesCompleted[idx] = !filesCompleted[idx];
                saveState();
                renderList();
                animateCounter();
            };
        });
    }
    
    function resetAll() { 
        if(confirm('Сбросить все отметки?')) {
            filesCompleted.fill(false); 
            saveState(); 
            renderList(); 
            animateCounter();
        }
    }
    
    function updateTimer() {
        const now = new Date();
        const mskTime = new Date(now.getTime() + (now.getTimezoneOffset() + 180) * 60000);
        
        let target = new Date(mskTime);
        target.setHours(18, 30, 0, 0);
        
        if (mskTime > target) {
            target.setDate(target.getDate() + 1);
        }
        
        const diff = Math.floor((target - mskTime) / 1000);
        
        if (diff <= 0) {
            document.getElementById('hours').innerText = '00';
            document.getElementById('minutes').innerText = '00';
            document.getElementById('seconds').innerText = '00';
            document.getElementById('timerStatus').innerHTML = '🎉 18:30 НАСТУПИЛО! АРХИВ ОТКРЫТ 🎉';
            return;
        }
        
        const hours = Math.floor(diff / 3600);
        const minutes = Math.floor((diff % 3600) / 60);
        const seconds = diff % 60;
        
        document.getElementById('hours').innerText = hours.toString().padStart(2,'0');
        document.getElementById('minutes').innerText = minutes.toString().padStart(2,'0');
        document.getElementById('seconds').innerText = seconds.toString().padStart(2,'0');
        
        if (hours === 0 && minutes < 30) {
            document.getElementById('timerStatus').innerHTML = '🔥 ОТСЧЕТ ПОЧТИ ЗАВЕРШЕН! 🔥';
        } else {
            document.getElementById('timerStatus').innerHTML = '⏳ ДО ОТКРЫТИЯ АРХИВА ⏳';
        }
    }
    
    let timerInterval = null;
    function startTimer() { updateTimer(); if (timerInterval) clearInterval(timerInterval); timerInterval = setInterval(updateTimer, 1000); }

    function executeUnlock() {
        mainContent.style.display = 'block';
        loadState();
        renderList();
        startTimer();
        document.getElementById('resetAllBtn').onclick = () => resetAll();
        animateCounter();
    }
    
    function showModal() { customModal.style.display = 'flex'; pendingUnlock = true; }
    function closeModalAndUnlock() { if(pendingUnlock) executeUnlock(); customModal.style.display = 'none'; }

    mainContent.style.display = 'none';
    showModal();
    
    closeCustomModalBtn.onclick = closeModalAndUnlock;
    customModal.onclick = (e) => { if(e.target === customModal) closeModalAndUnlock(); };
</script>
</body>
</html>
